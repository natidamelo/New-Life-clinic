<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Registration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-warning { background-color: #ffc107; color: black; }
        .btn-danger { background-color: #dc3545; color: white; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Device Registration Test</h1>
    
    <div class="section">
        <h2>Current Status</h2>
        <div id="currentStatus">Loading...</div>
    </div>
    
    <div class="section">
        <h2>Actions</h2>
        <button class="btn-primary" onclick="checkRegistration()">Check Registration</button>
        <button class="btn-success" onclick="simulateRegistration()">Simulate Registration</button>
        <button class="btn-warning" onclick="clearRegistration()">Clear Registration</button>
        <button class="btn-danger" onclick="clearAllStorage()">Clear All Storage</button>
    </div>
    
    <div class="section">
        <h2>Storage Contents</h2>
        <div id="storageContents">Click "Check Registration" to see contents</div>
    </div>
    
    <div class="section">
        <h2>Debug Info</h2>
        <div id="debugInfo">Click "Check Registration" to see debug info</div>
    </div>

    <script>
        // Simulate user object (like in the real app)
        const mockUser = {
            _id: '507f1f77bcf86cd799439011',
            id: '507f1f77bcf86cd799439011',
            firstName: 'John',
            lastName: 'Doe',
            username: 'johndoe',
            email: 'john@example.com',
            role: 'doctor'
        };

        function checkRegistration() {
            const deviceRegistered = localStorage.getItem('deviceRegistered');
            const staffUserId = localStorage.getItem('staffUserId');
            const staffHash = localStorage.getItem('staffHash');
            const registrationTimestamp = localStorage.getItem('registrationTimestamp');
            
            // Check backup storage
            const clinicDeviceRegistered = localStorage.getItem('clinic_deviceRegistered');
            const clinicStaffUserId = localStorage.getItem('clinic_staffUserId');
            const clinicStaffHash = localStorage.getItem('clinic_staffHash');
            
            // Check session storage
            const sessionDeviceRegistered = sessionStorage.getItem('deviceRegistered');
            const sessionStaffUserId = sessionStorage.getItem('staffUserId');
            const sessionStaffHash = sessionStorage.getItem('staffHash');
            
            const userId = mockUser._id || mockUser.id;
            const isRegistered = deviceRegistered === 'true' && staffUserId === userId && staffHash;
            
            // Update current status
            document.getElementById('currentStatus').innerHTML = `
                <div class="${isRegistered ? 'success' : 'error'}">
                    <h3>${isRegistered ? '✅ Device Registered' : '❌ Device Not Registered'}</h3>
                    <p><strong>User ID:</strong> ${userId}</p>
                    <p><strong>Device Registered:</strong> ${deviceRegistered || 'null'}</p>
                    <p><strong>Staff User ID:</strong> ${staffUserId || 'null'}</p>
                    <p><strong>Staff Hash:</strong> ${staffHash ? staffHash.substring(0, 20) + '...' : 'null'}</p>
                    <p><strong>Match:</strong> ${staffUserId === userId ? '✅' : '❌'}</p>
                </div>
            `;
            
            // Update storage contents
            document.getElementById('storageContents').innerHTML = `
                <h3>LocalStorage</h3>
                <pre>deviceRegistered: ${deviceRegistered || 'null'}
staffUserId: ${staffUserId || 'null'}
staffHash: ${staffHash || 'null'}
registrationTimestamp: ${registrationTimestamp || 'null'}</pre>
                
                <h3>Backup Storage (clinic_ prefix)</h3>
                <pre>clinic_deviceRegistered: ${clinicDeviceRegistered || 'null'}
clinic_staffUserId: ${clinicStaffUserId || 'null'}
clinic_staffHash: ${clinicStaffHash || 'null'}</pre>
                
                <h3>Session Storage</h3>
                <pre>deviceRegistered: ${sessionDeviceRegistered || 'null'}
staffUserId: ${sessionStaffUserId || 'null'}
staffHash: ${sessionStaffHash || 'null'}</pre>
            `;
            
            // Update debug info
            document.getElementById('debugInfo').innerHTML = `
                <h3>Registration Check Logic</h3>
                <pre>deviceRegistered === 'true': ${deviceRegistered === 'true'}
staffUserId === userId: ${staffUserId === userId}
staffHash exists: ${!!staffHash}
Final result: ${isRegistered}</pre>
                
                <h3>User Object</h3>
                <pre>${JSON.stringify(mockUser, null, 2)}</pre>
            `;
        }
        
        function simulateRegistration() {
            const userId = mockUser._id || mockUser.id;
            const hash = 'test_hash_' + Date.now();
            const timestamp = new Date().toISOString();
            
            // Store in primary location
            localStorage.setItem('deviceRegistered', 'true');
            localStorage.setItem('staffUserId', userId);
            localStorage.setItem('staffHash', hash);
            localStorage.setItem('registrationTimestamp', timestamp);
            
            // Store in backup location
            localStorage.setItem('clinic_deviceRegistered', 'true');
            localStorage.setItem('clinic_staffUserId', userId);
            localStorage.setItem('clinic_staffHash', hash);
            localStorage.setItem('clinic_registrationTimestamp', timestamp);
            
            // Store in session storage
            sessionStorage.setItem('deviceRegistered', 'true');
            sessionStorage.setItem('staffUserId', userId);
            sessionStorage.setItem('staffHash', hash);
            sessionStorage.setItem('registrationTimestamp', timestamp);
            
            // Store user info
            const userInfo = {
                firstName: mockUser.firstName,
                lastName: mockUser.lastName,
                username: mockUser.username,
                email: mockUser.email,
                role: mockUser.role
            };
            
            localStorage.setItem('userInfo', JSON.stringify(userInfo));
            localStorage.setItem('clinic_userInfo', JSON.stringify(userInfo));
            
            alert('Device registration simulated! Click "Check Registration" to verify.');
            checkRegistration();
        }
        
        function clearRegistration() {
            localStorage.removeItem('deviceRegistered');
            localStorage.removeItem('staffUserId');
            localStorage.removeItem('staffHash');
            localStorage.removeItem('registrationTimestamp');
            localStorage.removeItem('userInfo');
            
            localStorage.removeItem('clinic_deviceRegistered');
            localStorage.removeItem('clinic_staffUserId');
            localStorage.removeItem('clinic_staffHash');
            localStorage.removeItem('clinic_registrationTimestamp');
            localStorage.removeItem('clinic_userInfo');
            
            sessionStorage.removeItem('deviceRegistered');
            sessionStorage.removeItem('staffUserId');
            sessionStorage.removeItem('staffHash');
            sessionStorage.removeItem('registrationTimestamp');
            
            alert('Device registration cleared! Click "Check Registration" to verify.');
            checkRegistration();
        }
        
        function clearAllStorage() {
            localStorage.clear();
            sessionStorage.clear();
            alert('All storage cleared! Click "Check Registration" to verify.');
            checkRegistration();
        }
        
        // Auto-check on page load
        window.onload = function() {
            checkRegistration();
        };
    </script>
</body>
</html>
