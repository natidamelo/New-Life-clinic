# Render Blueprint: deploy API from /backend (where helmet, mongoose, etc. live)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: new-life-clinic-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_USERNAME
        value: superadmin
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_EMAIL
        value: superadmin@clinic.local
